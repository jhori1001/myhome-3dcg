<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>マイホーム 3DCG（4LDK+2WIC）</title>
<style>
  html, body { margin: 0; padding: 0 !important; overflow: hidden; height: 100%; background: #d7e4ee; font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif; }
  #app { position: fixed; inset: 0; }
  #app canvas { display: block; }
  #labels { position: absolute; inset: 0; pointer-events: none; }
  .room-label { position: absolute; color: #222; font-size: 13px; font-weight: 600; text-shadow: 0 1px 2px rgba(255,255,255,.9), 0 -1px 2px rgba(255,255,255,.9); white-space: pre; text-align: center; transform: translate(-50%,-50%); }
  #ui { position: absolute; top: 14px; left: 14px; background: rgba(252,251,248,.94); border-radius: 12px; padding: 14px 16px; box-shadow: 0 4px 18px rgba(30,34,38,.22); font-size: 13px; color: #26292d; z-index: 10; min-width: 210px; }
  #ui h1 { font-size: 14px; margin: 0 0 3px; letter-spacing: .02em; }
  #ui .note { font-size: 11px; color: #6d6a63; margin: 0 0 10px; }
  #modes { display: flex; gap: 6px; margin-bottom: 9px; }
  #modes button { flex: 1; padding: 7px 0; border-radius: 8px; border: 1px solid #b9b4aa; background: #fff; cursor: pointer; font-size: 13px; color: #26292d; }
  #modes button.active { background: #2d3138; color: #fff; border-color: #2d3138; }
  #ui label { display: block; margin: 4px 0; cursor: pointer; }
  #ui .small { margin-top: 7px; }
  #ui .small button { padding: 5px 11px; border-radius: 7px; border: 1px solid #b9b4aa; background: #fff; cursor: pointer; font-size: 12px; color: #26292d; }
  #hint { position: absolute; bottom: 12px; left: 14px; font-size: 11px; color: #3a3d42; background: rgba(252,251,248,.88); padding: 6px 11px; border-radius: 8px; z-index: 10; }
  /* スマホ・小画面向け */
  @media (max-width: 640px) {
    #ui { top: 10px; left: 10px; right: 10px; padding: 10px 12px; min-width: 0; border-radius: 10px; }
    #ui h1 { font-size: 13px; margin-bottom: 2px; }
    #ui .note { font-size: 10px; margin-bottom: 8px; }
    #modes { margin-bottom: 6px; }
    #modes button { padding: 10px 0; font-size: 14px; }
    #ui label { display: inline-block; font-size: 12px; margin: 2px 12px 0 0; }
    #ui .small { display: inline-block; margin-top: 2px; }
    #ui .small button { padding: 6px 10px; }
    #hint { left: 10px; right: 10px; bottom: 8px; text-align: center; font-size: 10px; padding: 5px 8px; }
    .room-label { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="ui">
    <h1>マイホーム 3DCG</h1>
    <p class="note">4LDK+2WIC ／ 間取り図からの再現モデル</p>
    <div id="modes">
      <button data-m="ext" class="active">外観</button>
      <button data-m="f1">1階</button>
      <button data-m="f2">2階</button>
    </div>
    <label><input type="checkbox" id="toggleLabels" checked /> 室名を表示</label>
    <div class="small"><button id="viewTop">真上から見る</button></div>
  </div>
  <div id="hint">ドラッグ: 回転 ／ ホイール: ズーム ／ 右ドラッグ: 移動</div>
  <div id="labels"></div>
</div>
